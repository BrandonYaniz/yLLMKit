name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package-tests:
    name: Swift package tests
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version
          xcrun --find swift

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build and test
        run: ./scripts/ci-test.sh
